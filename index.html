<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="BRIXPIX">
    <meta name="application-name" content="BRIXPIX">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f4efe2">
    <title>BRIXPIX</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/brixpix-apple-touch-icon.png">
    <link rel="icon" href="icons/brixpix-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="booth" data-ring="off" data-filter="none" data-logo="on">
      <section id="stage" class="stage" aria-label="Camera preview and capture result">
        <video id="camera" class="camera" autoplay playsinline muted></video>
        <canvas id="snapshot" class="hidden"></canvas>
        <div id="liveOverlays" class="live-overlays">
          <div class="booth-logo">BRIX<span>PIX</span></div>
          <div id="stickersLayer" class="stickers-layer" aria-label="Stickers"></div>
        </div>
        <div id="result" class="result hidden" aria-live="polite"></div>
        <div id="countdown" class="countdown hidden" aria-live="assertive"></div>
        <button id="tapToStart" class="tap-to-start" type="button">Tap Camera To Start</button>
      </section>

      <section class="controls" aria-label="Photo booth controls">
        <div class="brand-lockup" aria-hidden="true">
          <span>BRIXPIX</span>
          <strong>BRICK 2026</strong>
        </div>

        <div class="top-row">
          <button id="startCamera" class="primary" type="button">Start</button>
          <label class="field">
            <span>Timer</span>
            <select id="timer">
              <option value="0">Off</option>
              <option value="3" selected>3</option>
              <option value="5">5</option>
              <option value="10">10</option>
            </select>
          </label>
          <label class="toggle">
            <input id="ringLight" type="checkbox">
            <span>Light</span>
          </label>
        </div>

        <div class="overlay-panel">
          <div class="mini-label">Filter</div>
          <div class="chip-row filters" role="group" aria-label="Filter">
            <button class="chip selected" type="button" data-filter-choice="none">Clean</button>
            <button class="chip" type="button" data-filter-choice="warm">Warm</button>
            <button class="chip" type="button" data-filter-choice="flash">Flash</button>
            <button class="chip" type="button" data-filter-choice="mono">B/W</button>
            <button class="chip" type="button" data-filter-choice="acid">Acid</button>
            <button class="chip" type="button" data-filter-choice="disco">Disco</button>
            <button class="chip" type="button" data-filter-choice="dream">Dream</button>
            <button class="chip" type="button" data-filter-choice="vhs">VHS</button>
          </div>

          <div class="mini-label">Add Sticker</div>
          <div class="chip-row stickers" role="group" aria-label="Add sticker">
            <button class="chip" type="button" data-sticker-choice="norbit">NORBITLUVR</button>
            <button class="chip" type="button" data-sticker-choice="brickdup">BRICKDUP</button>
            <button class="chip" type="button" data-sticker-choice="congrats">CONGRATS</button>
            <button class="chip emoji-chip" type="button" data-sticker-choice="diamond">💎</button>
          </div>

          <div class="sticker-tools">
            <button id="rotateSticker" class="tool-button" type="button">Rotate</button>
            <button id="removeSticker" class="tool-button" type="button">Remove</button>
            <label class="toggle compact">
              <input id="logoOverlay" type="checkbox" checked>
              <span>Logo</span>
            </label>
          </div>
        </div>

        <div class="capture-row">
          <button id="takePhoto" class="primary" type="button" disabled>Photo</button>
          <button id="recordVideo" type="button" disabled>Video</button>
        </div>

        <div class="share-row">
          <button id="shareCapture" type="button" disabled>Share</button>
          <a id="downloadCapture" class="button disabled" href="#" download aria-disabled="true">Download</a>
          <button id="clearCapture" type="button" disabled>Retake</button>
        </div>

        <div id="adminPanel" class="admin-panel hidden">
          <button id="exportArchive" type="button">Export Saved Photos</button>
          <span id="archiveCount">0 saved</span>
        </div>

        <p id="status" class="status">Tap Start, or tap the camera area.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
